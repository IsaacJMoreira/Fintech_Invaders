<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>FabGL Sprite Editor</title>

    <style>
      body {
        background: #202020;
        color: white;
        font-family: Arial;
      }

      .container {
        display: flex;
        gap: 30px;
      }

      #grid {
        display: grid;
        gap: 1px;
        background: #444;
      }

      .pixel {
        cursor: pointer;
        background: black;
      }

      .palette {
        display: grid;
        grid-template-columns: repeat(16, 30px);
        gap: 4px;
        margin-top: 10px;
      }

      .color {
        width: 30px;
        height: 30px;
        border: 2px solid white;
        cursor: pointer;
      }

      textarea {
        width: 100%;
        height: 200px;
        margin-top: 10px;
      }

      canvas {
        border: 1px solid white;
      }

      .controls {
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <h2>FabGL RGBA2222 Sprite Editor</h2>

    <div class="controls">
      Width
      <input id="width" type="number" value="32" />

      Height
      <input id="height" type="number" value="32" />

      Sprite W
      <input id="spriteW" type="number" value="16" />

      Sprite H
      <input id="spriteH" type="number" value="16" />

      Zoom
      <input type="range" id="zoom" min="4" max="40" value="16" />

      <button onclick="applySize()">Apply</button>

      <button onclick="clearSprite()">Clear</button>

      <button onclick="exportSheet()">Export Sheet</button>

      <button onclick="exportFrames()">Export Frames</button>

      <input type="file" id="pngLoader" />

      <label>
        <input type="checkbox" id="ditherToggle" checked />
        Dithering
      </label>
    </div>

    <div class="container">
      <div>
        <div id="grid"></div>

        <div id="palette" class="palette"></div>
      </div>

      <div>
        <h3>Preview</h3>
        <canvas id="preview" width="256" height="256"></canvas>

        <h3>Animation</h3>
        <canvas id="anim" width="128" height="128"></canvas>

        <br />

        Frame Speed
        <input type="range" id="speed" min="50" max="500" value="150" />

        <h3>C++ Output</h3>

        <textarea id="cppOutput"></textarea>
      </div>
    </div>

    <script>
      let width = 32;
      let height = 32;

      let spriteW = 16;
      let spriteH = 16;

      let zoom = 16;

      let pixels = [];

      let currentColor = { r: 3, g: 3, b: 3, a: 3 };
      let transparentColor = null;
      let mouseDown = false;

      const grid = document.getElementById("grid");

      const preview = document.getElementById("preview");
      const ctx = preview.getContext("2d");

      const anim = document.getElementById("anim");
      const actx = anim.getContext("2d");

      function rgbaToCss(c) {
        return `rgba(${c.r * 85},${c.g * 85},${c.b * 85},${c.a / 3})`;
      }

      function rgbaToByte(c) {
        return (c.a << 6) | (c.b << 4) | (c.g << 2) | c.r;
      }

      function byteToRGBA(b) {
        return {
          a: (b >> 6) & 3,
          b: (b >> 4) & 3,
          g: (b >> 2) & 3,
          r: b & 3,
        };
      }

      function buildPalette() {
        let p = document.getElementById("palette");
        p.innerHTML = "";

        let colors = [];

        colors.push({ r: 0, g: 0, b: 0, a: 0 });

        for (let r = 0; r < 4; r++)
          for (let g = 0; g < 4; g++)
            for (let b = 0; b < 4; b++) colors.push({ r, g, b, a: 3 });

        colors.forEach((c) => {
          let el = document.createElement("div");

          el.className = "color";
          el.style.background = rgbaToCss(c);

          el.onclick = () => {
            currentColor = c;
          };

          // RIGHT CLICK = SET TRANSPARENT COLOR
          el.oncontextmenu = (e) => {
            e.preventDefault();
            transparentColor = c;

            document
              .querySelectorAll(".color")
              .forEach((x) => (x.style.outline = "none"));
            el.style.outline = "3px solid cyan";
          };

          p.appendChild(el);
        });
      }

      function applySize() {
        width = parseInt(widthInput.value);
        height = parseInt(heightInput.value);

        spriteW = parseInt(spriteWInput.value);
        spriteH = parseInt(spriteHInput.value);

        zoom = parseInt(document.getElementById("zoom").value);

        buildGrid();
      }

      function buildGrid() {
        grid.innerHTML = "";

        grid.style.gridTemplateColumns = `repeat(${width},${zoom}px)`;

        pixels = [];

        for (let y = 0; y < height; y++)
          for (let x = 0; x < width; x++) {
            let p = { r: 0, g: 0, b: 0, a: 0 };

            pixels.push(p);

            let div = document.createElement("div");

            div.className = "pixel";

            div.style.width = zoom + "px";
            div.style.height = zoom + "px";

            div.onmousedown = () => {
              mouseDown = true;
              paint(div, p);
            };

            div.onmouseover = () => {
              if (mouseDown) paint(div, p);
            };

            grid.appendChild(div);
          }

        drawPreview();
      }

      function paint(div, p) {
        p.r = currentColor.r;
        p.g = currentColor.g;
        p.b = currentColor.b;
        p.a = currentColor.a;

        div.style.background = rgbaToCss(p);

        drawPreview();
      }

      document.body.onmouseup = () => (mouseDown = false);

      function drawPreview() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, 256, 256);

        let sx = 256 / width;
        let sy = 256 / height;

        for (let y = 0; y < height; y++)
          for (let x = 0; x < width; x++) {
            let p = pixels[y * width + x];

            if (p.a === 0) continue;

            ctx.fillStyle = rgbaToCss(p);

            ctx.fillRect(x * sx, y * sy, sx, sy);
          }

        drawGridOverlay();
      }

      function drawGridOverlay() {
        let sx = 256 / width;
        let sy = 256 / height;

        ctx.strokeStyle = "rgba(255,255,255,0.25)";

        for (let x = spriteW; x < width; x += spriteW) {
          ctx.beginPath();
          ctx.moveTo(x * sx, 0);
          ctx.lineTo(x * sx, 256);
          ctx.stroke();
        }

        for (let y = spriteH; y < height; y += spriteH) {
          ctx.beginPath();
          ctx.moveTo(0, y * sy);
          ctx.lineTo(256, y * sy);
          ctx.stroke();
        }
      }

      function clearSprite() {
        pixels.forEach((p) => {
          p.r = 0;
          p.g = 0;
          p.b = 0;
          p.a = 0;
        });

        document
          .querySelectorAll(".pixel")
          .forEach((p) => (p.style.background = "black"));

        drawPreview();
      }

      function exportSheet() {
        let txt = "const uint8_t sprite_sheet[] = {\n";

        for (let y = 0; y < height; y++) {
          for (let x = 0; x < width; x++) {
            let b = rgbaToByte(pixels[y * width + x]);

            txt += "0x" + b.toString(16).padStart(2, "0") + ",";
          }

          txt += "\n";
        }

        txt += "};\n\n";

        txt += `Bitmap sheet = Bitmap(${width},${height},sprite_sheet,PixelFormat::RGBA2222);`;

        cppOutput.value = txt;
      }

      function exportFrames() {
        let cols = Math.floor(width / spriteW);
        let rows = Math.floor(height / spriteH);

        let txt = "";
        let frame = 0;

        for (let fy = 0; fy < rows; fy++)
          for (let fx = 0; fx < cols; fx++) {
            txt += `const uint8_t frame_${frame}[] = {\n`;

            for (let y = 0; y < spriteH; y++) {
              for (let x = 0; x < spriteW; x++) {
                let px = (fy * spriteH + y) * width + (fx * spriteW + x);

                let b = rgbaToByte(pixels[px]);

                txt += "0x" + b.toString(16).padStart(2, "0") + ",";
              }

              txt += "\n";
            }

            txt += "};\n";

            txt += `Bitmap sprite_${frame} = Bitmap(${spriteW},${spriteH},frame_${frame},PixelFormat::RGBA2222);\n\n`;

            frame++;
          }

        cppOutput.value = txt;
      }

      function animate() {
        let cols = Math.floor(width / spriteW);
        let rows = Math.floor(height / spriteH);

        let frames = cols * rows;

        let frame = 0;

        setInterval(() => {
          actx.fillStyle = "black";
          actx.fillRect(0, 0, 128, 128);

          let fx = frame % cols;
          let fy = Math.floor(frame / cols);

          let sx = 128 / spriteW;
          let sy = 128 / spriteH;

          for (let y = 0; y < spriteH; y++)
            for (let x = 0; x < spriteW; x++) {
              let px = (fy * spriteH + y) * width + (fx * spriteW + x);

              let p = pixels[px];

              if (p.a === 0) continue;

              actx.fillStyle = rgbaToCss(p);

              actx.fillRect(x * sx, y * sy, sx, sy);
            }

          frame = (frame + 1) % frames;
        }, speed.value);
      }

      pngLoader.onchange = (e) => {
        let file = e.target.files[0];

        let img = new Image();

        img.onload = () => {
          let c = document.createElement("canvas");

          c.width = width;
          c.height = height;

          let cx = c.getContext("2d");

          cx.drawImage(img, 0, 0, width, height);

          let image = cx.getImageData(0, 0, width, height);
          let data = image.data;

          let useDither = document.getElementById("ditherToggle").checked;

          function distribute(x, y, er, eg, eb, f) {
            if (x < 0 || x >= width || y < 0 || y >= height) return;

            let i = (y * width + x) * 4;

            data[i] += er * f;
            data[i + 1] += eg * f;
            data[i + 2] += eb * f;
          }

          for (let y = 0; y < height; y++)
            for (let x = 0; x < width; x++) {
              let i = (y * width + x) * 4;

              let r = data[i];
              let g = data[i + 1];
              let b = data[i + 2];
              let a = data[i + 3];

              let qr = Math.floor(r / 64);
              let qg = Math.floor(g / 64);
              let qb = Math.floor(b / 64);

              let nr = qr * 85;
              let ng = qg * 85;
              let nb = qb * 85;
              let pr = qr;
              let pg = qg;
              let pb = qb;

              let pa = 3;

              if (
                transparentColor &&
                pr === transparentColor.r &&
                pg === transparentColor.g &&
                pb === transparentColor.b
              ) {
                pa = 0;
              }

              pixels[y * width + x].r = pr;
              pixels[y * width + x].g = pg;
              pixels[y * width + x].b = pb;
              pixels[y * width + x].a = pa;

              if (!useDither) continue;

              let er = r - nr;
              let eg = g - ng;
              let eb = b - nb;

              let ditherStrength = 0.33;

              distribute(x + 1, y, er, eg, eb, (7 / 16) * ditherStrength);
              distribute(x - 1, y + 1, er, eg, eb, (3 / 16) * ditherStrength);
              distribute(x, y + 1, er, eg, eb, (5 / 16) * ditherStrength);
              distribute(x + 1, y + 1, er, eg, eb, (1 / 16) * ditherStrength);
            }

          updateGrid();
        };

        img.src = URL.createObjectURL(file);
      };

      function updateGrid() {
        let divs = document.querySelectorAll(".pixel");

        for (let i = 0; i < pixels.length; i++)
          divs[i].style.background = rgbaToCss(pixels[i]);

        drawPreview();
      }

      let widthInput = document.getElementById("width");
      let heightInput = document.getElementById("height");

      let spriteWInput = document.getElementById("spriteW");
      let spriteHInput = document.getElementById("spriteH");

      buildPalette();
      buildGrid();
      animate();
    </script>
  </body>
</html>
